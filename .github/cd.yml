name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  deploy-test:
    name: Docker Deployment Test

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: ubuntu-latest

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull Docker image
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/devops-demo:latest

      - name: Run container
        run: |
          docker run -d \
          --name devops-demo-test \
          -p 8080:80 \
          ${{ secrets.DOCKERHUB_USERNAME }}/devops-demo:latest

      - name: Test website
        run: |
          curl localhost:8080

      - name: Show container
        run: |
          docker ps

      - name: Cleanup
        if: always()
        run: |
          docker stop devops-demo-test || true
          docker rm devops-demo-test || true